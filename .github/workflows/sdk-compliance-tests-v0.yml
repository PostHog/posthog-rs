name: SDK Compliance Tests (V0 Capture)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'compliance/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/sdk-compliance-tests-v0.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'compliance/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/sdk-compliance-tests-v0.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pull-requests: write

jobs:
  test-rust-sdk-v0:
    uses: PostHog/posthog-sdk-test-harness/.github/workflows/test-sdk-action.yml@68498bcf3ae95ac941476e6ca3d42d6086e1c7fd
    with:
      adapter-dockerfile: compliance/v0/Dockerfile
      adapter-context: .
      test-harness-version: "0.9.0"
      report-name: rust-sdk-compliance-report-v0
      concurrency: 10
